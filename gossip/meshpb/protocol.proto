//go:build !solution

syntax = "proto3";

option go_package = "gitlab.com/slon/shad-go/gossip/meshpb";

// PeerMeta is arbitrary message that is propagated with peer gossip.
message PeerMeta {
  string name = 1;
}

message EmptyData {};

message NewPeerData {
  string peer_endpoint = 1;
  PeerMeta peer_meta = 2;
}

service GossipService {
  rpc Ping(EmptyData) returns (EmptyData);
  rpc Update(NewPeerData) returns (EmptyData);
}
